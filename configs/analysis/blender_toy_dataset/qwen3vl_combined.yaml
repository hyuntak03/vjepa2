# ============================================================================
# BLENDER TOY-PHYSICS R² REGRESSION (COMBINED) — qwen3vl   (paper Fig.2c polar, ONE plot)
# Paper-faithful Kubric-style Blender data. velocity+acceleration in ONE run; per-variable
# R² on valid clips only (NaN-masked): speed=392 / accel_mag=280 / direction=672.
# env: lmms_eval_py311_2.7
# 실행: python -m evals.main --fname configs/analysis/blender_toy_dataset/qwen3vl_combined.yaml --devices cuda:0 --debugmode True
# ============================================================================

eval_name: analysis_vlm
folder: /data/hyuntak/project/2026/2027_cvpr/vjepa2/configs/analysis/blender_toy_dataset/logs
num_workers: 8
resume_checkpoint: false
val_only: false
tag: qwen3vl-blender-combined

experiment:
  analysis:
    model: qwen3vl

    task: regression
    regression:
      targets_npy: /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/blender_toy/blender_targets.npy   # (672,4)=[speed, sinθ, cosθ, accel_mag], NaN=미정의
      variables:
        - {name: speed,     cols: [0]}     # 등속 클립에서만 (accel 클립은 NaN→마스킹)
        - {name: direction, cols: [1, 2]}  # 모든 클립
        - {name: accel_mag, cols: [3]}     # 등가속 클립에서만

    stages:
      vision_encoder: [3, 7, 11, 15, 19, 23]
      after_merger: true
    plot: true
    plot_pez: [0.2, 0.4]        # Physics Emergence Zone 음영(layer-fraction). false/삭제하면 끔

    probes:
      - type: linear
        pooling: framewise_mean   # 시간순서 보존
        pre_norm: true
        optimization: { lr: 0.001, weight_decay: 0.1, warmup: 2.0 }

  data:
    dataset_train: /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/blender_toy/combined_train.csv
    dataset_val:   /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/blender_toy/combined_val.csv
    num_classes: 4               # 회귀에선 무시
    frames_per_clip: 16          # 논문 inference=16f@24fps

  optimization:
    batch_size: 8
    num_epochs: 40
    use_bfloat16: true
    save_optimizer: false
    cache_features: true
    cache_pooling: framewise
    cache_max_gb: 64
    default_head:
      start_lr: 0.0
      final_lr: 0.0
      final_weight_decay: 0.0

model_kwargs:
  checkpoint: Qwen/Qwen3-VL-4B-Instruct
  cache_dir: /data/dataset/LLaVA-Video-100K-Subset/
  module_name: evals.analysis_vlm.modelcustom.qwen3vl_encoder
  pretrain_kwargs:
    encoder: {}
  wrapper_kwargs:
    resize_mode: smart
    min_pixels: 8192
    max_pixels: 112896
    attn_implementation: sdpa
    dtype: float16
