# ============================================================================
# TOY-PHYSICS R² REGRESSION — vjepa / acceleration   (paper "Interpreting Physics", Fig.2 polar)
# env: vjepa2  | 논문 inference = 16 frames @ 24fps
# 실행(디버그): python -m evals.main --fname configs/analysis/toy_dataset/vjepa_acceleration.yaml --devices cuda:0 --debugmode True
# ============================================================================

eval_name: analysis_vlm
folder: /data/hyuntak/project/2026/2027_cvpr/vjepa2/configs/analysis/toy_dataset/logs
num_workers: 8
resume_checkpoint: false
val_only: false
tag: vjepa-toy-acceleration

experiment:
  analysis:
    model: vjepa

    task: regression
    regression:
      targets_npy: /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/toy_physics/acceleration_targets.npy
      variables:
        - {name: accel_mag, cols: [0]}        # polar scalar
        - {name: direction, cols: [1, 2]}  # θ → (sin, cos)

    stages:
      vision_encoder: all
    plot: true
    plot_pez: [0.2, 0.4]        # Physics Emergence Zone 음영(layer-fraction). false/삭제하면 끔

    probes:
      - type: linear
        pooling: mean   # V-JEPA 시공간 인코더 → 전역 mean에도 방향 보존
        pre_norm: true
        optimization: { lr: 0.001, weight_decay: 0.1, warmup: 2.0 }

  data:
    dataset_type: VideoDataset
    resolution: 256
    resize_mode: resize          # 384² 전체 보존 (crop은 가장자리 손실 → motion 손해)
    frame_step: 4              # ★ 64f 전체 궤적을 stride-4로 16프레임 균일샘플 (1이면 앞 16f=1/4만 = sub-patch motion → early-scalar 안 잡힘)
    uniform_sampling: true     # ★ 전체 영상에서 16프레임 균일샘플(길이무관). frame_step보다 robust
    num_segments: 1
    num_views_per_segment: 1
    dataset_train: /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/toy_physics/acceleration_train.csv
    dataset_val:   /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/toy_physics/acceleration_val.csv
    num_classes: 4               # 회귀에선 무시(출력차원=variable cols)
    frames_per_clip: 16          # 논문 inference=16f@24fps (toy 영상은 64f@8fps → 16 균일샘플)

  optimization:
    batch_size: 8
    num_epochs: 40
    use_bfloat16: true
    save_optimizer: false
    cache_features: true
    cache_pooling: pooled
    cache_max_gb: 64
    default_head:
      start_lr: 0.0
      final_lr: 0.0
      final_weight_decay: 0.0

model_kwargs:
  checkpoint: /data/hyuntak/project/2026/2027_cvpr/vjepa2/checkpoint/models--facebook--vjepa2-vitl-fpc64-256/snapshots/b3c1679b7c34d3255ef3547f27c7b226aefab26f/original/model.pth
  module_name: evals.analysis.modelcustom.vit_encoder_multilayer
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
      img_temporal_dim_size: null
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
