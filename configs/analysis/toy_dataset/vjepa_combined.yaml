# ============================================================================
# TOY-PHYSICS R² REGRESSION (COMBINED) — vjepa   (paper Fig.2c polar, ALL in ONE plot)
# velocity + acceleration 영상을 합쳐 한 run. 변수별로 유효한 영상에서만 R² (NaN 마스킹):
#   speed = 등속 392개 / accel_mag = 등가속 280개 / direction = 672개 전부.
# env: vjepa2  | 논문 inference = 16 frames @ 24fps
# 실행: python -m evals.main --fname configs/analysis/toy_dataset/vjepa_combined.yaml --devices cuda:0 --debugmode True
# ============================================================================

eval_name: analysis_vlm
folder: /data/hyuntak/project/2026/2027_cvpr/vjepa2/configs/analysis/toy_dataset/logs
num_workers: 8
resume_checkpoint: false
val_only: false
tag: vjepa-toy-polar_regression

experiment:
  analysis:
    model: vjepa

    task: regression
    regression:
      targets_npy: /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/toy_physics/combined_targets.npy   # (672,4)=[speed, sinθ, cosθ, accel_mag], NaN=미정의
      variables:
        - {name: speed,     cols: [0]}     # 등속 클립에서만 (accel 클립은 NaN→마스킹)
        - {name: direction, cols: [1, 2]}  # 모든 클립
        - {name: accel_mag, cols: [3]}     # 등가속 클립에서만

    stages:
      vision_encoder: all
    plot: true

    # probes:
    #   - type: linear
    #     pooling: mean   # V-JEPA 시공간 → 전역 mean OK
    #     pre_norm: true
    #     optimization: { lr: 0.01, weight_decay: 0.0, warmup: 1.0 }

  data:
    dataset_type: VideoDataset
    resolution: 256
    resize_mode: resize
    frame_step: 1
    num_segments: 1
    num_views_per_segment: 1
    dataset_train: /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/toy_physics/combined_train.csv
    dataset_val:   /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/toy_physics/combined_val.csv
    num_classes: 4               # 회귀에선 무시
    frames_per_clip: 16          # 논문 inference=16f@24fps

  optimization:
    batch_size: 8
    num_epochs: 20
    use_bfloat16: true
    save_optimizer: false
    cache_features: true
    cache_pooling: pooled
    cache_max_gb: 80
    default_head:
      start_lr: 0.0
      final_lr: 0.0
      final_weight_decay: 0.0

model_kwargs:
  checkpoint: /data/hyuntak/project/2026/2027_cvpr/vjepa2/checkpoint/models--facebook--vjepa2-vitl-fpc64-256/snapshots/b3c1679b7c34d3255ef3547f27c7b226aefab26f/original/model.pth
  module_name: evals.analysis.modelcustom.vit_encoder_multilayer
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
      img_temporal_dim_size: null
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
