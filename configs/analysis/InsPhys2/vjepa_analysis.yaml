# ============================================================================
# ANALYSIS TEMPLATE — V-JEPA2 (vitl-fpc64-256)   [model: vjepa]
# ----------------------------------------------------------------------------
# 통합 probing harness. eval_name: analysis_vlm -> evals/analysis_vlm/eval.py
# conda env: vjepa2
#
# 실행(단일 GPU 디버그):
#   python -m evals.main --fname configs/analysis/vjepa_analysis.yaml \
#          --devices cuda:0 --debugmode True
# 다중 GPU (vll4, 8장):
#   sbatch --export=ALL,CONDA_ENV=vjepa2,\
# CONFIG=configs/analysis/vjepa_analysis.yaml z_scripts/run_analysis_vlm.sh
#
# ▶ 핵심: stages.vision_encoder 로 ViT를 LAYER-WISE 하게 선택해 probing.
#         list[int] (특정 블록들) 또는 "all" (전 블록 0..23). V-JEPA은 backbone뿐.
# ============================================================================

eval_name: analysis_vlm
folder: /data/hyuntak/project/2026/2027_cvpr/vjepa2/configs/analysis/InsPhys2/logs   # 저장: <folder>/analysis_vlm/<tag>/
num_workers: 8
resume_checkpoint: false        # true면 <folder>/analysis_vlm/<tag>/latest.pt 에서 이어서
val_only: false                 # true=평가만(학습 skip)
tag: vjepa2_IntPhys2_possible_impossible_attentive_probing

experiment:
  analysis:
    model: vjepa                # vjepa | llavavideo | qwen3vl  (backend + 데이터경로 자동 선택)

    # ── STAGE 선택 ─────────────────────────────────────────────────────────
    # V-JEPA backbone == vision_encoder. layer-wise 선택:
    stages:
      # vision_encoder: [3, 5, 7, 11, 15, 19, 23]   # ViT 블록 인덱스 0..23 (23=마지막)
      vision_encoder: all                        # ← 전 24개 블록 layer-wise scan
    # (shorthand 도 허용: stages: all  /  stages: [5,11,17,23])

    plot: true                  # 학습 끝나면 x=layer, y=best val acc 그래프(stage_val_acc.png)

    # ── PROBE 정의: (stage × probe) 마다 헤드 1개를 동시 학습 ────────────────
    probes:
      # - type: linear            # 토큰 pooling 후 Linear (진짜 linear probing)
      #   pooling: mean           # mean | max | meanmax
      #   pre_norm: true          # pooled feature LayerNorm (layer간 scale 보정; 권장)
      #   optimization: { lr: 0.01, weight_decay: 0.0, warmup: 1.0 }
      - type: attentive         # learnable query cross-attention pooling + Linear
        num_heads: 16
        num_probe_blocks: 4     # depth-1=정석(가벼움). self-attn (depth-1)개 + cross-attn 1개
        # temporal_pos: none    # V-JEPA은 RoPE로 시간정보가 토큰값에 이미 있어 none. (learnable/rope는
                                # VLM backend 전용 — vit backbone엔 num_temporal 미노출이라 미지원)
        optimization: { lr: 0.002, weight_decay: 0.01, warmup: 2.0 }

  data:
    dataset_type: VideoDataset
    # CSV: "<영상_절대경로> <정수라벨>" (헤더 없음, 공백 구분)
    dataset_train: /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/IntPhys2/IntPhys2_2way_easy_train.csv
    dataset_val:   /data/hyuntak/project/2026/2027_cvpr/vjepa2/data_csv/IntPhys2/IntPhys2_2way_easy_val.csv
    num_classes: 2
    resolution: 256             # fpc64-256 체크포인트는 256
    resize_mode: crop           # 공간 처리: crop=짧은변 resize+center crop(원본 학습방식, 기본) |
                                #   resize=resolution²로 직접 resize(aspect squash, VLM SigLIP 방식).
                                #   (raw 경로 llava/qwen엔 무관 — clip 경로 전용)
    frames_per_clip: 32         # 짝수 (tubelet_size=2)
    frame_step: 1
    num_segments: 1             # 영상당 temporal clip 수 (분석은 1 권장)
    num_views_per_segment: 1    # spatial multi-crop (분석은 1 권장)

  optimization:
    batch_size: 8
    num_epochs: 20
    use_bfloat16: true          # AMP float16 autocast
    save_optimizer: false       # latest.pt에 optimizer 상태 저장 여부(false=probe 가중치만, 용량↓)
    # ── 속도: frozen 인코더 + augment 없음 → feature 1회 추출 후 캐시, probe만 반복(epoch ~초) ──
    cache_features: true        # ★ frozen 인코더 → 1회 추출 후 캐시 (epoch마다 재인코딩 X, ~20배↑).
                                # 주의: clip-path train 로더는 원래 augmentation(RandAug/random-crop)을 쓰는데
                                #   캐시는 train/val 모두 deterministic(no-aug)으로 추출 → "무-augment probing"이 됨
                                #   (val/inference는 어차피 no-aug라 동일; train-time aug 정규화만 빠짐 — frozen
                                #    인코더 linear/attentive probe엔 보통 불필요하고 llava/qwen과도 일관됨).
    cache_pooling: tokens       # tokens=전체 토큰(attentive 포함 전부 OK, 용량 큼) |
                                # pooled=mean‖max만(매우 작음, linear 전용) → vision_encoder:all 층스캔에 최적
                                #   (pooled 쓰려면 probes에서 attentive 빼고 linear만 남길 것)
                                # ※ RAM: tokens·7stage·32f·256 ≈ 88GB/rank(4GPU, abort) / 44GB(8GPU, OK).
                                #   4GPU거나 attentive 불필요하면 pooled 권장. 넘치면 가드가 깔끔히 abort.
    cache_max_gb: 116            # tokens 캐시 per-rank RAM 추정이 이 값 넘으면 abort (가드)
    default_head:               # 각 probe.optimization 이 생략한 값의 기본
      start_lr: 0.0
      final_lr: 0.0
      final_weight_decay: 0.01

model_kwargs:
  checkpoint: /data/hyuntak/project/2026/2027_cvpr/vjepa2/checkpoint/models--facebook--vjepa2-vitl-fpc64-256/snapshots/b3c1679b7c34d3255ef3547f27c7b226aefab26f/original/model.pth
  module_name: evals.analysis.modelcustom.vit_encoder_multilayer
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder   # target_encoder=EMA(평가표준) | encoder=online
      model_name: vit_large            # "all" 깊이 추론에 사용 (vit_large=24)
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
      img_temporal_dim_size: null
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
    # out_layers 는 stages.vision_encoder 에서 자동 주입됨
